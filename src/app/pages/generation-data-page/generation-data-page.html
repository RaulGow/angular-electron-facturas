<div class="container">
  <h2>Crear Nueva Factura</h2>
  <form [formGroup]="invoiceForm" (ngSubmit)="onSubmit()">

    <div class="header-fields">
      <app-input-generic 
        label="Nombre del Cliente"
        formControlName="customer"
        placeholder="Nombre del Cliente"
        [error]="invoiceForm.get('customer')?.touched && invoiceForm.get('customer')?.invalid ? 'Nombre obligatorio' : null"
      />

      <mat-form-field appearance="outline" color="accent">
        <mat-label>Fecha de emisión</mat-label>
        <input matInput 
              [matDatepicker]="picker" 
              formControlName="date"
              [min]="today"
              placeholder="Seleccione fecha">
        <mat-hint>Formato sugerido: DD/MM/YYYY</mat-hint>
        <mat-datepicker-toggle matIconSuffix [for]="picker">
          <mat-icon matDatepickerToggleIcon>event</mat-icon>
        </mat-datepicker-toggle>
        <mat-datepicker
          #picker 
          startView="month">
        </mat-datepicker>
      </mat-form-field>
    </div>

    <hr>

    <div formArrayName="items">
      <div *ngFor="let item of items.controls; let i=index" [formGroupName]="i" class="item-row">

        <app-select-generic
          class="col-desc"
          label="Unidad de Medida"
          [options]="articulos" 
          formControlName="description"
          placeholder="Kg, g, ud..."
          [error]="invoiceForm.get('description')?.invalid && invoiceForm.get('description')?.touched ? 'Obligatorio' : null">
        </app-select-generic>
        <app-input-generic 
        class="col-qty"
          label="Cantidad"
          type="number"
          formControlName="quantity"
          placeholder="1"
        />
        <app-input-generic 
          class="col-subtotal"
          label="Precio €"
          type="number"
          formControlName="price"
          placeholder="0"
        />

        <div class="col-subtotal">
          <small>Subtotal</small>
          <p>{{ (item.get('quantity')?.value * item.get('price')?.value) | currency:'EUR' }}</p>
        </div>

        <app-action-button
          type="submit"
          [isWhiteIcon]="true"
          icon="assets/icons/close-large-line.svg"
          variant="primary"
          (onClick)="removeItem(i)">
        </app-action-button>
      </div>
    </div>

    <div class="footer-actions">

      <app-action-button
        type="submit"
        label="Añadir Línea"
        icon="assets/icons/add-large-line.svg"
        variant="success"
        [isWhiteIcon]="true"
        (onClick)="addItem()">
      </app-action-button>
      <app-action-button
        type="submit"
        [isWhiteIcon]="true"
        [disabled]="invoiceForm.invalid"
        label="Generar Factura"
        icon="assets/icons/file-pdf-2-line.svg"
        variant="primary">
      </app-action-button>
      <app-action-button
        label="Volver al Panel"
        icon="assets/icons/arrow-go-back-fill.svg"
        variant="secondary"
        (onClick)="volverAlDashboard()">
      </app-action-button>
    </div>
  </form>
</div>
